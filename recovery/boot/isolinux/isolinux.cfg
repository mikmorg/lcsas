# LCSAS recovery -- isolinux (BIOS) boot menu
#
# Four entries, with Linux as default and a 10-second selection
# timeout.  See boot/grub.cfg for the UEFI mirror.

DEFAULT linux
TIMEOUT 100
PROMPT  1
UI menu.c32

MENU TITLE LCSAS Recovery Boot Menu
MENU AUTOBOOT Booting Linux in # seconds...

LABEL linux
  MENU LABEL Linux 6.6 LTS (recovery)
  KERNEL /boot/linux/vmlinuz
  APPEND initrd=/boot/initramfs.cpio.gz console=tty0 console=ttyS0,115200 quiet rdinit=/init

LABEL freebsd
  MENU LABEL FreeBSD 13.4 (alternate kernel)
  KERNEL /boot/freebsd/loader.bin
  APPEND -

LABEL shell
  MENU LABEL Drop to BusyBox shell
  KERNEL /boot/linux/vmlinuz
  APPEND initrd=/boot/initramfs.cpio.gz console=tty0 console=ttyS0,115200 rdinit=/bin/sh

LABEL restore
  MENU LABEL Run lcsas-restore directly (skip rootfs)
  KERNEL /boot/linux/vmlinuz
  APPEND initrd=/boot/initramfs.cpio.gz console=tty0 console=ttyS0,115200 rdinit=/bin/lcsas-restore
