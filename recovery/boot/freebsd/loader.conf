# FreeBSD 13.4-RELEASE bootloader configuration for the LCSAS recovery
# medium.
#
# Set boot from CD/DVD/BD device 0 (cd0).  Mount the recovery filesystem
# RO and exec /init (which is our lcsas-init binary).

# Module path on the recovery ISO.
module_path="/boot/freebsd/kernel;/boot/freebsd/modules"

# Mount the optical disc as root.
vfs.root.mountfrom="cd9660:cd0"
vfs.root.mountfrom.options="ro"

# Standard modules for CD/DVD/BD + USB optical drives.
cd9660_load="YES"
udf_load="YES"
umass_load="YES"

# Console: prefer serial for headless recovery.
boot_serial="YES"
comconsole_speed="115200"

# Verbose boot helps when debugging recovery on unfamiliar hardware.
verbose_loading="YES"
