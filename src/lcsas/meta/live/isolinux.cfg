# isolinux/syslinux configuration for LCSAS Recovery Environment
# Used for Legacy BIOS boot from the meta-volume disc

DEFAULT lcsas
TIMEOUT 50
PROMPT 1

SAY =============================================
SAY   LCSAS Recovery Environment
SAY   Press ENTER to start restore wizard
SAY   Type 'verbose' for detailed boot
SAY =============================================

LABEL lcsas
    MENU LABEL LCSAS Recovery -- Restore My Files
    KERNEL /boot/vmlinuz
    APPEND initrd=/boot/initramfs quiet loglevel=3 console=tty1
    MENU DEFAULT

LABEL verbose
    MENU LABEL LCSAS Recovery -- Verbose Boot
    KERNEL /boot/vmlinuz
    APPEND initrd=/boot/initramfs loglevel=7 console=tty1

LABEL local
    MENU LABEL Boot from Hard Drive
    LOCALBOOT 0
