# GRUB2 configuration for LCSAS Recovery Environment
# Used for UEFI boot from the meta-volume disc

set timeout=5
set default=0

# Disable graphical terminal — we want text mode for maximum compat
terminal_input console
terminal_output console

menuentry "LCSAS Recovery -- Restore My Files" --id lcsas {
    linux /boot/vmlinuz quiet loglevel=3 console=tty1
    initrd /boot/initramfs
}

menuentry "LCSAS Recovery -- Verbose Boot" --id lcsas-verbose {
    linux /boot/vmlinuz loglevel=7 console=tty1
    initrd /boot/initramfs
}

menuentry "Boot from Hard Drive" --id local {
    # Try to chainload the first hard drive
    insmod chain
    set root=(hd0)
    chainloader +1
}

menuentry "Reboot" --id reboot {
    reboot
}

menuentry "Power Off" --id halt {
    halt
}
